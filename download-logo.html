<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Logo</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; }
    .btn { padding: 15px 30px; background: #E8600A; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; cursor: pointer; border: none; }
    .btn:hover { background: #C74F00; transform: translateY(-2px); }
  </style>
</head>
<body>
  <h2>Your High-Resolution Social Media Logo</h2>
  <canvas id="canvas" width="1024" height="1024" style="display:none;"></canvas>
  <img id="preview" style="width: 256px; height: 256px; background: white; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); padding: 20px;" />
  
  <button class="btn" onclick="downloadLogo()">Download Logo (PNG)</button>

  <script>
    // The raw SVG string for the logo
    const svgString = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1024" height="1024">
        <!-- Shield Background -->
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="#1A2E44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Bug inside -->
        <svg viewBox="0 0 24 24" x="4.5" y="4.5" width="15" height="15" fill="none" stroke="#E8600A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3 3 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M17.47 9c1.93-.2 3.53-1.9 3.53-3.9"/><path d="M6 14H2"/><path d="M22 14h-4"/><path d="M17.5 19c2-2.5 3.5-5.5 3.5-9"/><path d="M3 10c0 3.5 1.5 6.5 3.5 9"/>
        </svg>
      </svg>
    `;

    // Convert SVG to Base64
    const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
    const DOMURL = window.URL || window.webkitURL || window;
    const url = DOMURL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      DOMURL.revokeObjectURL(url);
      
      // Set preview
      document.getElementById('preview').src = canvas.toDataURL('image/png');
    };
    img.src = url;

    function downloadLogo() {
      const canvas = document.getElementById('canvas');
      const pngUrl = canvas.toDataURL('image/png');
      const downloadLink = document.createElement('a');
      downloadLink.href = pngUrl;
      downloadLink.download = 'huntington-park-spider-control-logo.png';
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }
  </script>
</body>
</html>
